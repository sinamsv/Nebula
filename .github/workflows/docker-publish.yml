name: Publish Docker image

# Fires when a GitHub Release is published (not on a bare tag push --
# a tag can exist before its release is actually published, e.g. while
# drafting release notes, and we only want to build once the release
# is real). Sina: create the release with a tag like "v1.4.0" and this
# builds + pushes automatically.
on:
  release:
    types: [published]

# GHCR needs `packages: write`. `contents: read` is enough to check out
# the repo — no broader permissions requested.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No long-lived registry credentials stored anywhere: GITHUB_TOKEN
      # is minted fresh per workflow run by GitHub Actions itself and
      # expires when the job ends -- this IS the "temporary token for
      # GitHub Packages" mechanism, nothing extra to configure.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tags pushed: exactly the release's tag name (e.g. v1.4.0) and
      # `latest`. No extra major/minor floating tags, per what was
      # confirmed.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
