# Railway / PaaS Deployment Changes (v1.6.1):
# - Only publish port 8080 (Next.js) -- FastAPI (8000) is internal-only
#   since v1.6.1, reached only via Next.js's rewrites() proxy over
#   localhost inside the container (see main.py and
#   web_frontend/next.config.mjs). Publishing 8000 externally used to be
#   misleading (the browser was never meant to call it directly) and, on
#   real PaaS platforms like Railway, simply isn't possible anyway (they
#   only route to one port per service).
# - NEXT_PUBLIC_API_BASE_URL build arg now defaults to the relative
#   "/api/v1" path, matching .env.sample and web_frontend/lib/api.ts's
#   own new default -- no absolute backend URL to keep in sync anymore.
# - How to revert: republish "8000:8000", and set the build arg back to
#   an absolute "http://localhost:8000/api/v1" URL.
#
# NOTE: this docker-compose.yml is for LOCAL/self-hosted use (a single
# machine running both services via Docker). Railway does not use this
# file directly -- Railway builds straight from the Dockerfile and reads
# env vars from its own dashboard/CLI, not from a mounted .env or this
# compose file's `environment:`/`env_file:` blocks. Keep this file around
# for anyone self-hosting via `docker compose up`.
name: nebula

services:
  nebula:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the frontend's compiled JS at image-build time
        # (see Dockerfile's frontend-builder stage) -- relative by
        # default so the SAME built image works correctly no matter
        # which host/port/domain it ends up served from. Only change
        # this to an absolute URL if you're intentionally bypassing
        # the rewrites() proxy (e.g. frontend and backend deployed as
        # fully separate services).
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    # For local dev, build from source. To instead run the published
    # image from GHCR, comment out `build:` above and uncomment:
    # image: ghcr.io/sinamsv/nebulabot:latest
    container_name: nebula
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Named volume: persists nebula.db across container
      # recreates/rebuilds without relying on a host path. Mounted at
      # /app/data (a subdirectory, not /app itself) so a rebuild that
      # changes app code never risks the volume mount shadowing it —
      # only ./data needs to survive rebuilds/upgrades.
      - nebula-data:/app/data
    environment:
      # Requires main.py to read DB_PATH via os.getenv() — see
      # core/database.py's default. Without this, SQLite falls back
      # to ./nebula.db inside the container's ephemeral filesystem and
      # this volume mount has nothing to actually persist.
      - DB_PATH=/app/data/nebula.db
    ports:
      # 8080: the Next.js frontend -- the ONLY port that needs to be
      # published. It's the single public entrypoint; FastAPI (8000)
      # is reached only from inside the container via Next.js's own
      # rewrites() proxy and is intentionally not published here.
      - "8080:8080"

volumes:
  nebula-data: