name: nebula

services:
  nebula:
    build:
      context: .
      dockerfile: Dockerfile
    # For local dev, build from source. To instead run the published
    # image from GHCR, comment out `build:` above and uncomment:
    # image: ghcr.io/sinamsv/nebulabot:latest
    container_name: nebula
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Named volume: persists nebula.db across container
      # recreates/rebuilds without relying on a host path. Mounted at
      # /app/data (a subdirectory, not /app itself) so a rebuild that
      # changes app code never risks the volume mount shadowing it —
      # only ./data needs to survive rebuilds/upgrades.
      - nebula-data:/app/data
    environment:
      # Requires main.py to read DB_PATH via os.getenv() — see
      # main.py.patch. Without that one-line change, SQLite falls back
      # to ./nebula.db inside the container's ephemeral filesystem and
      # this volume mount has nothing to actually persist.
      - DB_PATH=/app/data/nebula.db
    ports:
      # Only meaningful when WEB_ENABLED=true in .env (see .env.sample)
      # -- Discord/Telegram need no published port at all (outbound-only
      # gateway/long-polling connections). Left unconditional here
      # (rather than a separate compose profile) since an unused
      # published port on a container that never listens is harmless;
      # keeping one compose file (no separate web-only override file)
      # was the confirmed, simpler choice for this pass.
      - "${WEB_PORT:-8000}:8000"

volumes:
  nebula-data:
