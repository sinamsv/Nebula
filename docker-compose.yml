# Port configuration changes:
# - Swap backend external port from 50051 to 8000.
# - Swap frontend external port from 50080 to 8080.
# - Rationale: align with standard web and FastAPI port conventions (8000/8080).
# - How to revert: change NEXT_PUBLIC_API_BASE_URL back to 50051, and ports back to 50051:8000 and 50080:50080.
name: nebula

services:
  nebula:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the frontend's compiled JS at image-build time
        # (see Dockerfile's frontend-builder stage) -- this is the
        # address the BROWSER will call, not an internal container
        # address. Left at localhost:8000 by default since the
        # common case is "browser and backend both reachable via
        # localhost on the host machine running Docker". If you
        # deploy this somewhere the backend has a different public
        # address, override this build arg (see README note below).
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    # For local dev, build from source. To instead run the published
    # image from GHCR, comment out `build:` above and uncomment:
    # image: ghcr.io/sinamsv/nebulabot:latest
    container_name: nebula
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Named volume: persists nebula.db across container
      # recreates/rebuilds without relying on a host path. Mounted at
      # /app/data (a subdirectory, not /app itself) so a rebuild that
      # changes app code never risks the volume mount shadowing it —
      # only ./data needs to survive rebuilds/upgrades.
      - nebula-data:/app/data
    environment:
      # Requires main.py to read DB_PATH via os.getenv() — see
      # main.py.patch. Without that one-line change, SQLite falls back
      # to ./nebula.db inside the container's ephemeral filesystem and
      # this volume mount has nothing to actually persist.
      - DB_PATH=/app/data/nebula.db
    ports:
      # 8000: the FastAPI backend, mapped to external port 8000.
      # The backend listens on 8000 inside the container and is reachable
      # from your machine at 8000, matching NEXT_PUBLIC_API_BASE_URL reference.
      - "8000:8000"
      # 8080: the Next.js frontend, mapped to external port 8080.
      - "8080:8080"
      # Both lines are harmless no-ops if the corresponding adapter is
      # left disabled in .env -- an unused published port on a
      # container that never listens on it doesn't cause errors.

volumes:
  nebula-data:
